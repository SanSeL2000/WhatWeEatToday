<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🍽 Планировщик ужинов</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg: #0b0f1a; --bg2: #111827;
  --glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.10);
  --glass-hover: rgba(255,255,255,0.08);
  --accent: #f4a261; --accent2: #e76f51;
  --text: #e8e8f0; --muted: #8b8fa8;
  --success: #52c078; --danger: #e05c6b;
  --radius: 16px; --radius-sm: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden; font-size: 15px;
  -webkit-tap-highlight-color: transparent;
}
body::before, body::after {
  content: ''; position: fixed; border-radius: 50%;
  filter: blur(100px); pointer-events: none; z-index: 0;
}
body::before {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(244,162,97,0.12) 0%, transparent 70%);
  top: -200px; left: -200px;
}
body::after {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(231,111,81,0.10) 0%, transparent 70%);
  bottom: -200px; right: -200px;
}

/* Sync indicator */
.sync-dot {
  position: fixed; bottom: 80px; right: 16px; z-index: 8000;
  display: flex; align-items: center; gap: 6px;
  background: rgba(11,15,26,0.88); border: 1px solid var(--glass-border);
  border-radius: 99px; padding: 5px 12px 5px 8px; font-size: 12px; color: var(--muted);
  backdrop-filter: blur(12px); transition: all 0.3s;
}
.sync-dot .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success); box-shadow: 0 0 6px var(--success); flex-shrink: 0;
}
.sync-dot.syncing .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1s infinite; }
.sync-dot.error .dot   { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Layout */
.app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 16px 12px 100px; }

header { text-align: center; padding: 36px 0 28px; }
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.7rem, 5vw, 3.2rem); font-weight: 700;
  background: linear-gradient(135deg, #f4a261, #e76f51, #ffd166);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: -0.5px;
}
header p { color: var(--muted); margin-top: 8px; font-weight: 300; font-size: 14px; }

/* Tabs */
.tabs {
  display: flex; gap: 6px; margin-bottom: 20px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 6px; backdrop-filter: blur(20px);
  overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1; min-width: 90px; min-height: 44px; padding: 10px 12px;
  border: none; border-radius: var(--radius-sm);
  background: transparent; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.25s; white-space: nowrap;
}
.tab-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 20px rgba(244,162,97,0.35); }
.tab-btn:not(.active):hover { background: var(--glass-hover); color: var(--text); }
.tab-btn .badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.25); border-radius: 99px;
  font-size: 11px; min-width: 18px; height: 18px; padding: 0 5px; margin-left: 5px; font-weight: 600;
}
.tab-btn:not(.active) .badge { background: var(--accent); color: #fff; }

/* Panels */
.panel { display: none; animation: fadeIn 0.3s ease; }
.panel.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:none } }

/* Glass */
.glass { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }

/* Dish grid */
.dishes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

.dish-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 18px; backdrop-filter: blur(20px);
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden;
}
.dish-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 60%, rgba(244,162,97,0.06)); pointer-events: none;
}
.dish-card:hover { border-color: rgba(244,162,97,0.4); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(244,162,97,0.12); }
.dish-card.selected { border-color: rgba(244,162,97,0.6); background: rgba(244,162,97,0.08); box-shadow: 0 0 0 1px rgba(244,162,97,0.3),0 8px 32px rgba(244,162,97,0.15); }
.dish-card.status-can { border-color: rgba(82,192,120,0.45); box-shadow: 0 0 0 1px rgba(82,192,120,0.15),0 8px 28px rgba(82,192,120,0.08); }
.dish-card.status-can::after { content:''; position:absolute; inset:0; border-radius:var(--radius); background:linear-gradient(135deg,rgba(82,192,120,0.07),transparent 60%); pointer-events:none; }
.dish-card.status-almost { border-color: rgba(255,209,102,0.4); box-shadow: 0 0 0 1px rgba(255,209,102,0.12),0 8px 28px rgba(255,209,102,0.07); }
.dish-card.status-almost::after { content:''; position:absolute; inset:0; border-radius:var(--radius); background:linear-gradient(135deg,rgba(255,209,102,0.06),transparent 60%); pointer-events:none; }

.dish-card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.dish-checkbox { width: 22px; height: 22px; accent-color: var(--accent); cursor: pointer; margin-top: 2px; flex-shrink: 0; }
.dish-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; line-height: 1.3; flex: 1; min-width: 0; }

.status-badge { font-size: 11px; font-weight: 600; border-radius: 99px; padding: 3px 9px; letter-spacing: 0.2px; white-space: nowrap; }
.status-badge.can    { background:rgba(82,192,120,0.18); color:#52c078; border:1px solid rgba(82,192,120,0.3); }
.status-badge.almost { background:rgba(255,209,102,0.18); color:#ffd166; border:1px solid rgba(255,209,102,0.3); }

.dish-recipe { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:12px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.dish-ingredients { display:flex; flex-wrap:wrap; gap:5px; }
.ingredient-pill { font-size:11px; background:rgba(255,255,255,0.07); border:1px solid var(--glass-border); border-radius:99px; padding:3px 9px; color:var(--muted); white-space:nowrap; }
.ingredient-pill span { color:var(--accent); }
.ingredient-pill.ing-present { border-color:rgba(82,192,120,0.4); color:#52c078; background:rgba(82,192,120,0.08); }
.ingredient-pill.ing-present span { color:#52c078; }
.ingredient-pill.ing-missing  { border-color:rgba(224,92,107,0.35); color:#e05c6b; background:rgba(224,92,107,0.07); }
.ingredient-pill.ing-missing span { color:#e05c6b; }

.dish-card-actions { margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; }
.btn-edit-sm   { font-size:12px; padding:6px 14px; min-height:34px; border:1px solid rgba(244,162,97,0.3); border-radius:99px; background:transparent; color:var(--accent); cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif; }
.btn-edit-sm:hover { background:rgba(244,162,97,0.12); border-color:var(--accent); }
.btn-danger-sm { font-size:12px; padding:6px 14px; min-height:34px; border:1px solid rgba(224,92,107,0.3); border-radius:99px; background:transparent; color:var(--danger); cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif; }
.btn-danger-sm:hover { background:rgba(224,92,107,0.15); border-color:var(--danger); }

/* Section title */
.section-title { font-family:'Playfair Display',serif; font-size:1.2rem; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
.section-title::after { content:''; flex:1; height:1px; background:var(--glass-border); }
.add-dish-section { margin-bottom:24px; }

/* Form */
.add-dish-form { background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius); padding:20px; backdrop-filter:blur(20px); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.form-group label { font-size:12px; color:var(--muted); font-weight:500; letter-spacing:.3px; }

input[type="text"], textarea {
  background:rgba(255,255,255,0.05); border:1px solid var(--glass-border);
  border-radius:var(--radius-sm); padding:10px 14px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:15px; outline:none;
  transition:border-color .2s,box-shadow .2s; width:100%;
  min-height:44px; -webkit-appearance:none;
}
input[type="text"]:focus, textarea:focus {
  border-color:rgba(244,162,97,0.5); box-shadow:0 0 0 3px rgba(244,162,97,0.10);
  background:rgba(255,255,255,0.07);
}
textarea { min-height:90px; resize:vertical; }

.ingredients-editor { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.ingredient-row { display:flex; gap:8px; align-items:center; }
.ingredient-row input { flex:1; min-width:0; }
.ingredient-row input:nth-child(2) { max-width:130px; }
.btn-icon {
  width:38px; height:38px; min-width:38px; border:1px solid var(--glass-border);
  border-radius:var(--radius-sm); background:transparent; color:var(--muted); cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:18px; transition:all .2s; flex-shrink:0;
}
.btn-icon:hover { background:rgba(224,92,107,0.15); border-color:var(--danger); color:var(--danger); }

/* Buttons */
.btn { padding:11px 20px; border-radius:var(--radius-sm); border:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; transition:all .2s; min-height:44px; white-space:nowrap; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
.btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; box-shadow:0 4px 16px rgba(244,162,97,0.3); }
.btn-primary:hover { box-shadow:0 6px 24px rgba(244,162,97,0.45); transform:translateY(-1px); }
.btn-secondary { background:var(--glass); border:1px solid var(--glass-border); color:var(--text); }
.btn-secondary:hover { background:var(--glass-hover); }
.btn-add-ing {
  background:transparent; border:1px dashed rgba(244,162,97,0.4); color:var(--accent);
  border-radius:var(--radius-sm); padding:10px 14px; font-size:13px; cursor:pointer;
  transition:all .2s; font-family:'DM Sans',sans-serif; display:flex; align-items:center;
  gap:6px; width:100%; justify-content:center; min-height:44px;
}
.btn-add-ing:hover { background:rgba(244,162,97,0.08); border-color:var(--accent); }
.form-actions { display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; }

/* Filters */
.dish-filters { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
.filter-btn {
  padding:8px 14px; min-height:40px; border-radius:99px; border:1px solid var(--glass-border);
  background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:13px;
  font-weight:500; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:6px; white-space:nowrap;
}
.filter-btn:hover { background:var(--glass-hover); color:var(--text); }
.filter-btn.active { background:var(--glass-hover); color:var(--text); border-color:rgba(255,255,255,0.25); }
.filter-btn.filter-can.active    { background:rgba(82,192,120,0.15); border-color:rgba(82,192,120,0.5); color:#52c078; }
.filter-btn.filter-almost.active { background:rgba(255,209,102,0.15); border-color:rgba(255,209,102,0.5); color:#ffd166; }
.filter-count { background:rgba(255,255,255,0.12); border-radius:99px; font-size:11px; min-width:18px; height:18px; padding:0 5px; display:inline-flex; align-items:center; justify-content:center; font-weight:600; }

/* Fridge */
.fridge-add-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
.fridge-add-row input { flex:1; min-width:120px; }
.fridge-add-row input:nth-child(2) { max-width:160px; }
.fridge-list { display:flex; flex-direction:column; gap:8px; }
.fridge-item { display:flex; align-items:center; gap:12px; background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:12px 16px; transition:border-color .2s; }
.fridge-item:hover { border-color:rgba(244,162,97,0.25); }
.fridge-item-name { flex:1; font-weight:500; min-width:0; word-break:break-word; }
.fridge-item-qty { font-size:13px; color:var(--accent); background:rgba(244,162,97,0.12); border-radius:99px; padding:2px 10px; border:1px solid rgba(244,162,97,0.2); white-space:nowrap; }
.btn-del { background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:16px; width:36px; height:36px; min-width:36px; display:flex; align-items:center; justify-content:center; border-radius:6px; transition:all .2s; flex-shrink:0; }
.btn-del:hover { background:rgba(224,92,107,0.15); color:var(--danger); }

/* Empty state */
.empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }
.empty-state .emoji { font-size:2.5rem; display:block; margin-bottom:10px; }

/* Cart */
.cart-header-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
.btn-clear-cart { background:transparent; border:1px solid rgba(224,92,107,0.35); color:var(--danger); font-size:13px; padding:8px 14px; }
.btn-clear-cart:hover { background:rgba(224,92,107,0.1); }
.cart-action-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
.btn-tg { background:linear-gradient(135deg,#229ED9,#1a7fb5); color:#fff; border:none; font-size:13px; padding:9px 16px; box-shadow:0 4px 16px rgba(34,158,217,0.3); }
.btn-tg:hover { box-shadow:0 6px 24px rgba(34,158,217,0.45); transform:translateY(-1px); }
.btn-tg:disabled { opacity:.6; cursor:not-allowed; transform:none; }
.btn-export { background:transparent; border:1px solid rgba(255,255,255,0.18); color:var(--text); font-size:13px; padding:9px 16px; }
.btn-export:hover { background:var(--glass-hover); }

.cart-tabs { display:flex; gap:6px; margin-bottom:18px; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.cart-tabs::-webkit-scrollbar { display:none; }
.cart-tab { padding:8px 16px; min-height:40px; white-space:nowrap; border:1px solid var(--glass-border); border-radius:var(--radius-sm); background:transparent; color:var(--muted); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; transition:all .2s; }
.cart-tab.active { background:rgba(244,162,97,0.15); border-color:rgba(244,162,97,0.4); color:var(--accent); }
.cart-inner { display:none; }
.cart-inner.active { display:block; animation:fadeIn .25s ease; }

.selected-dish-card { background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius); padding:18px; margin-bottom:12px; }
.selected-dish-card h3 { font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:8px; }
.selected-dish-card p { font-size:13px; color:var(--muted); line-height:1.6; }
.shopping-list { display:flex; flex-direction:column; gap:8px; }
.shopping-item { display:flex; align-items:center; gap:12px; background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:12px 16px; }
.shopping-item-name { flex:1; font-weight:500; }
.shopping-item-qty { font-size:13px; color:var(--accent); white-space:nowrap; }
.missing-dish-block { background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius); padding:14px 18px; margin-bottom:10px; }
.missing-dish-block h4 { font-family:'Playfair Display',serif; font-size:.95rem; margin-bottom:8px; }
.missing-pills { display:flex; flex-wrap:wrap; gap:6px; }
.missing-pill { font-size:12px; background:rgba(224,92,107,0.1); border:1px solid rgba(224,92,107,0.3); border-radius:99px; padding:3px 10px; color:#e05c6b; }
.all-good-note { font-size:13px; color:var(--success); background:rgba(82,192,120,0.1); border:1px solid rgba(82,192,120,0.25); border-radius:var(--radius-sm); padding:10px 16px; }

/* Modals */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); backdrop-filter:blur(6px); z-index:1000; align-items:center; justify-content:center; padding:12px; overflow-y:auto; }
.modal-overlay.open { display:flex; animation:fadeIn .2s ease; }
.modal-box { width:100%; max-width:640px; margin:auto; padding:24px; border-radius:var(--radius); background:#151c2e; border:1px solid rgba(255,255,255,0.14); box-shadow:0 24px 80px rgba(0,0,0,0.6); }
.modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.modal-title { font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:700; }
.modal-close { background:transparent; border:1px solid var(--glass-border); color:var(--muted); width:36px; height:36px; border-radius:8px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
.modal-close:hover { background:rgba(224,92,107,0.15); color:var(--danger); border-color:var(--danger); }

/* Toast */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--bg2); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:12px 20px; color:var(--text); font-size:14px; backdrop-filter:blur(20px); box-shadow:0 8px 32px rgba(0,0,0,0.4); z-index:9999; opacity:0; transition:all .3s cubic-bezier(.34,1.56,.64,1); display:flex; align-items:center; gap:10px; max-width:calc(100vw - 32px); }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast-icon { font-size:1.2rem; }

/* Spinner */
.spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; margin-right:6px; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg) } }

/* Loading */
.app-loading { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9000; gap:16px; }
.app-loading .big-spinner { width:40px; height:40px; border:3px solid rgba(244,162,97,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin .9s linear infinite; }
.app-loading p { color:var(--muted); font-size:14px; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:99px; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  .form-row { grid-template-columns: 1fr; }
  .ingredient-row input:nth-child(2) { max-width: 100%; }
  .cart-action-row { flex-direction: column; }
  .cart-action-row .btn { width: 100%; }
}

@media (max-width: 480px) {
  .app { padding: 10px 10px 90px; }
  header { padding: 20px 0 18px; }
  .dishes-grid { grid-template-columns: 1fr; }
  .add-dish-form { padding: 14px; }
  .ingredient-row input:nth-child(2) { max-width: 110px; }
  .form-actions { flex-direction: column; }
  .form-actions .btn { width: 100%; }
  .fridge-add-row { flex-direction: column; }
  .fridge-add-row input, .fridge-add-row input:nth-child(2) { max-width: 100%; }
  .fridge-add-row .btn { width: 100%; }
  .cart-header-row { flex-direction: column; align-items: stretch; }
  .btn-clear-cart { width: 100%; }
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal-box { border-radius: var(--radius) var(--radius) 0 0; max-height: 92vh; overflow-y: auto; padding: 16px; }
  .dish-card-actions .btn-edit-sm,
  .dish-card-actions .btn-danger-sm { flex: 1; text-align: center; justify-content: center; }
  .filter-btn { font-size: 12px; padding: 7px 10px; }
  .sync-dot { bottom: 66px; right: 10px; font-size: 11px; }
  .tab-btn { font-size: 12px; padding: 8px 8px; min-width: 76px; }
}
</style>
</head>
<body>

<div class="app-loading" id="app-loading">
  <div class="big-spinner"></div>
  <p>Подключаемся к базе данных…</p>
</div>

<div class="sync-dot syncing" id="sync-dot">
  <span class="dot"></span>
  <span id="sync-label">Подключение…</span>
</div>

<div class="app">
  <header>
    <h1>🍽 Планировщик ужинов</h1>

    ingredients:[{name:'курица',qty:'500 г'},{name:'картофель',qty:'3 шт'},{name:'морковь',qty:'1 шт'},{name:'лук',qty:'1 шт'},{name:'зелень',qty:'пучок'},{name:'соль',qty:'по вкусу'}] }
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let dishes = [], fridge = [], selected = [];
let activeFilter = 'all';
let editingDishId = null;
let saveTimer = null;
let ignoreNextSnapshot = false;

// ─── FIREBASE ─────────────────────────────────────────────────────────────────
const fbApp = initializeApp(FB_CFG);
const db    = getFirestore(fbApp);
const DOC   = doc(db, 'mealPlanner', 'sharedData');

function setSyncState(state, label) {
  const el = document.getElementById('sync-dot');
  el.className = 'sync-dot' + (state ? ' ' + state : '');
  document.getElementById('sync-label').textContent = label;
}

async function loadFromFirestore() {
  setSyncState('syncing', 'Загрузка…');
  try {
    const snap = await getDoc(DOC);
    if (snap.exists()) {
      const d = snap.data();
      dishes   = d.dishes   || [];
      fridge   = d.fridge   || [];
      selected = d.selected || [];
    } else {
      dishes = DEFAULT_DISHES; fridge = []; selected = [];
      await setDoc(DOC, { dishes, fridge, selected });
    }
    setSyncState('', '💾 Синхронизировано');
  } catch(e) {
    setSyncState('error', '⚠️ Ошибка загрузки');
    console.error('Firestore load:', e);
    // Fallback to defaults so UI still works offline
    if (!dishes.length) dishes = DEFAULT_DISHES;
  }
}

function saveToFirestore() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    setSyncState('syncing', 'Сохранение…');
    ignoreNextSnapshot = true;
    try {
      await setDoc(DOC, { dishes, fridge, selected });
      setSyncState('', '💾 Синхронизировано');
    } catch(e) {
      setSyncState('error', '⚠️ Ошибка сохранения');
      console.error('Firestore save:', e);
    }
  }, 600);
}

function initFirestoreSync() {
  onSnapshot(DOC, (snap) => {
    if (ignoreNextSnapshot) { ignoreNextSnapshot = false; return; }
    if (!snap.exists()) return;
    const d = snap.data();
    dishes   = d.dishes   || [];
    fridge   = d.fridge   || [];
    selected = d.selected || [];
    renderAll();
    setSyncState('', '💾 Синхронизировано');
  }, (err) => {
    setSyncState('error', '⚠️ Нет соединения');
    console.error('Snapshot err:', err);
  });
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg, warn = false) {
  const icon = warn ? '⚠️' : (msg.match(/^[^\s]+/)||['✅'])[0];
  const text = msg.replace(/^[^\s]+\s/,'');
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-msg').textContent  = text;
  const el = document.getElementById('toast');
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function summarizeAmounts(amounts) {
  if (!amounts.length) return '—';
  if (amounts.length === 1) return amounts[0];
  const parsed = amounts.map(a => { const m=a.match(/^([\d.,]+)\s*(.*)$/); return m?{num:parseFloat(m[1].replace(',','.')),unit:m[2].trim()}:null; });
  const allSame = parsed.every(p => p && p.unit === parsed[0].unit);
  if (allSame && parsed[0]) {
    const sum = parsed.reduce((a,p)=>a+p.num,0);
    const nice = Number.isInteger(sum)?sum:+sum.toFixed(1);
    return nice+(parsed[0].unit?' '+parsed[0].unit:'');
  }
  return amounts.join(' + ');
}

// ─── FRIDGE MATCHING ──────────────────────────────────────────────────────────
function inFridge(name) {
  const n = name.toLowerCase().trim();
  return fridge.some(f => { const fn=f.name.toLowerCase().trim(); return fn.includes(n)||n.includes(fn); });
}
function dishFridgeStatus(dish) {
  const missing=[],present=[];
  (dish.ingredients||[]).forEach(i => (inFridge(i.name)?present:missing).push(i.name));
  return {missing,present};
}
function dishFilterType(dish) {
  const {missing}=dishFridgeStatus(dish);
  return missing.length===0?'can':missing.length<=2?'almost':'none';
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
window.switchTab = function(tab) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  const btn=document.getElementById('tab-btn-'+tab); if(btn)btn.classList.add('active');
  if(tab==='cart') renderCart();
};

window.switchCartTab = function(tab) {
  document.querySelectorAll('.cart-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.cart-inner').forEach(p=>p.classList.remove('active'));
  const btn=document.getElementById('cart-tab-'+tab); if(btn)btn.classList.add('active');
  document.getElementById('cart-'+tab).classList.add('active');
};

// ─── BADGES ───────────────────────────────────────────────────────────────────
function updateBadges() {
  document.getElementById('dishes-count').textContent = dishes.length;
  document.getElementById('cart-count').textContent   = selected.length;
  document.getElementById('fridge-count').textContent = fridge.length;
}

// ─── FILTER ───────────────────────────────────────────────────────────────────
window.setFilter = function(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('filter-'+f).classList.add('active');
  renderDishes();
};

// ─── RENDER DISHES ────────────────────────────────────────────────────────────
function renderDishes() {
  const grid = document.getElementById('dishes-grid');
  grid.innerHTML = '';
  const withStatus = dishes.map(d=>({dish:d,type:dishFilterType(d)}));
  document.getElementById('fc-all').textContent    = dishes.length;
  document.getElementById('fc-can').textContent    = withStatus.filter(x=>x.type==='can').length;
  document.getElementById('fc-almost').textContent = withStatus.filter(x=>x.type==='almost').length;

  const visible = activeFilter==='all'?withStatus
    :activeFilter==='can'?withStatus.filter(x=>x.type==='can')
    :withStatus.filter(x=>x.type==='almost');

  if (!visible.length) {
    grid.innerHTML=`<div class="empty-state"><span class="emoji">${activeFilter==='all'?'🍽':'🔍'}</span>${
      activeFilter==='all'?'Блюд пока нет. Добавьте первое!'
      :activeFilter==='can'?'Ни одно блюдо не совпадает с холодильником'
      :'Нет блюд с 1–2 недостающими ингредиентами'}</div>`;
    updateBadges(); return;
  }

  visible.forEach(({dish,type})=>{
    const isSel = selected.includes(dish.id);
    const {missing} = dishFridgeStatus(dish);
    const hasFridge = fridge.length>0;
    let badge='';
    if(hasFridge&&type==='can')    badge=`<span class="status-badge can">✅ Можно готовить</span>`;
    if(hasFridge&&type==='almost') badge=`<span class="status-badge almost">🛒 Нужно ещё ${missing.length}</span>`;
    const pillsHtml = (dish.ingredients||[]).map(i=>{
      let cls='ingredient-pill';
      if(hasFridge) cls+=inFridge(i.name)?' ing-present':' ing-missing';
      return `<span class="${cls}">${esc(i.name)} <span>${esc(i.qty)}</span></span>`;
    }).join('');
    let statusClass='';
    if(hasFridge){ if(type==='can')statusClass=' status-can'; else if(type==='almost')statusClass=' status-almost'; }
    const card=document.createElement('div');
    card.className='dish-card'+statusClass+(isSel?' selected':'');
    card.dataset.dishId=dish.id;
    card.innerHTML=`
      <div class="dish-card-header">
        <input type="checkbox" class="dish-checkbox" ${isSel?'checked':''} onchange="toggleSelected('${dish.id}',this.checked)" title="В корзину">
        <div class="dish-name">${esc(dish.name)}</div>${badge}
      </div>
      <div class="dish-recipe">${esc(dish.recipe)}</div>
      <div class="dish-ingredients">${pillsHtml}</div>
      <div class="dish-card-actions">
        <button class="btn-edit-sm" onclick="openEditModal('${dish.id}')">✏️ Изменить</button>
        <button class="btn-danger-sm" onclick="deleteDish('${dish.id}')">🗑 Удалить</button>
      </div>`;
    grid.appendChild(card);
  });
  updateBadges();
}

// ─── TOGGLE SELECTED ──────────────────────────────────────────────────────────
window.toggleSelected = function(id, checked) {
  if(checked){ if(!selected.includes(id))selected.push(id); }
  else { selected=selected.filter(s=>s!==id); }
  const card=document.querySelector(`.dish-card[data-dish-id="${id}"]`);
  if(card) card.classList.toggle('selected',checked);
  updateBadges(); renderCart(); saveToFirestore();
};

// ─── DELETE DISH ──────────────────────────────────────────────────────────────
window.deleteDish = function(id) {
  if(!confirm('Удалить блюдо?')) return;
  dishes=dishes.filter(d=>d.id!==id);
  selected=selected.filter(s=>s!==id);
  renderDishes(); renderCart(); saveToFirestore();
  toast('🗑 Блюдо удалено');
};

window.addIngredientRow = function(name='',qty='') {
  const list=document.getElementById('new-ingredients-list');
  const row=document.createElement('div'); row.className='ingredient-row';
  row.innerHTML=`<input type="text" placeholder="Название" value="${esc(name)}" data-role="ing-name">

window.clearDishForm = function() {
  document.getElementById('new-dish-name').value='';
  document.getElementById('new-dish-recipe').value='';
  document.getElementById('new-ingredients-list').innerHTML='';
};

window.saveDish = function() {
  const name=document.getElementById('new-dish-name').value.trim();
  const recipe=document.getElementById('new-dish-recipe').value.trim();
  if(!name){toast('⚠️ Введите название блюда',true);return;}
  const rows=document.querySelectorAll('#new-ingredients-list .ingredient-row');
  const ingredients=[];
  rows.forEach(r=>{
    const n=r.querySelector('[data-role="ing-name"]').value.trim();
    const q=r.querySelector('[data-role="ing-qty"]').value.trim();
    if(n)ingredients.push({name:n,qty:q});
  });
  dishes.push({id:'d'+Date.now(),name,recipe,ingredients});
  saveToFirestore(); renderDishes(); window.clearDishForm();
  toast('✅ Блюдо добавлено!');
};

window.openEditModal = function(id) {

  document.getElementById('edit-dish-recipe').value=dish.recipe;
  const list=document.getElementById('edit-ingredients-list');
  list.innerHTML='';
  (dish.ingredients||[]).forEach(i=>addEditIngredientRow(i.name,i.qty));
  if(!(dish.ingredients||[]).length) addEditIngredientRow();

  document.getElementById('edit-dish-name').focus();
};

window.addEditIngredientRow = function addEditIngredientRow(name='',qty='') {

  row.innerHTML=`<input type="text" placeholder="Название" value="${esc(name)}" data-role="ing-name">

    <button class="btn-icon" onclick="this.parentElement.remove()" title="Убрать">×</button>`;
  list.appendChild(row);
};

window.saveEditDish = function() {
  if(!editingDishId)return;
  const name=document.getElementById('edit-dish-name').value.trim();
  const recipe=document.getElementById('edit-dish-recipe').value.trim();
  if(!name){toast('⚠️ Введите название',true);return;}
  const rows=document.querySelectorAll('#edit-ingredients-list .ingredient-row');
  const ingredients=[];
  rows.forEach(r=>{
    const n=r.querySelector('[data-role="ing-name"]').value.trim();
    const q=r.querySelector('[data-role="ing-qty"]').value.trim();
    if(n)ingredients.push({name:n,qty:q});
  });
  const idx=dishes.findIndex(d=>d.id===editingDishId);
  if(idx!==-1){
    dishes[idx]={id:editingDishId,name,recipe,ingredients};
    saveToFirestore(); renderDishes();
    if(selected.includes(editingDishId))renderCart();
    toast('✅ Блюдо обновлено!');
  }
  document.getElementById('edit-modal-overlay').classList.remove('open');
  editingDishId=null;
};

  const name=document.getElementById('fridge-name').value.trim();
  const qty=document.getElementById('fridge-qty').value.trim();
  if(!name){toast('⚠️ Введите название продукта',true);return;}
  fridge.push({name,qty:qty||'—'});
  document.getElementById('fridge-name').value='';
  document.getElementById('fridge-qty').value='';
  saveToFirestore(); renderFridge(); renderDishes();
  toast('✅ Добавлено в холодильник');
};

window.deleteFridgeItem = function(i) {
  fridge.splice(i,1);
  saveToFirestore(); renderFridge(); renderDishes();
  toast('🗑 Продукт удалён');
};

// ─── CART ─────────────────────────────────────────────────────────────────────
function renderCart() {
  const sel=dishes.filter(d=>selected.includes(d.id));

  // Selected dishes
  const dl=document.getElementById('cart-dishes-list'); dl.innerHTML='';
  if(!sel.length) dl.innerHTML='<div class="empty-state"><span class="emoji">🛒</span>Нет выбранных блюд. Отметьте чекбоксы.</div>';
  else sel.forEach(d=>{ const el=document.createElement('div'); el.className='selected-dish-card'; el.innerHTML=`<h3>${esc(d.name)}</h3><p>${esc(d.recipe)}</p>`; dl.appendChild(el); });

  // Shopping list
  const totals={};
  sel.forEach(d=>(d.ingredients||[]).forEach(ing=>{
    const key=ing.name.toLowerCase().trim();
    if(!totals[key])totals[key]={name:ing.name,amounts:[]};
    if(ing.qty)totals[key].amounts.push(ing.qty);
  }));
  const sl=document.getElementById('shopping-list'); sl.innerHTML='';
  const entries=Object.values(totals);
  if(!entries.length) sl.innerHTML='<div class="empty-state"><span class="emoji">🛍</span>Список пуст</div>';
  else entries.forEach(e=>{ const el=document.createElement('div'); el.className='shopping-item'; el.innerHTML=`<span class="shopping-item-name">${esc(e.name)}</span><span class="shopping-item-qty">${summarizeAmounts(e.amounts)}</span>`; sl.appendChild(el); });

  // Missing
  const ml=document.getElementById('missing-list'); ml.innerHTML='';
  if(!sel.length) ml.innerHTML='<div class="empty-state"><span class="emoji">❌</span>Нет выбранных блюд</div>';
  else if(!fridge.length) ml.innerHTML='<div class="empty-state"><span class="emoji">🧊</span>Добавьте продукты в холодильник для сравнения</div>';
  else {
    let any=false;
    sel.forEach(d=>{ const {missing}=dishFridgeStatus(d); if(!missing.length)return; any=true;
      const b=document.createElement('div'); b.className='missing-dish-block';
      b.innerHTML=`<h4>${esc(d.name)}</h4><div class="missing-pills">${missing.map(m=>`<span class="missing-pill">❌ ${esc(m)}</span>`).join('')}</div>`;
      ml.appendChild(b);
    });
    if(!any) ml.innerHTML='<div class="all-good-note">✅ Все ингредиенты есть в холодильнике!</div>';
  }
}

window.clearCart = function() {
  if(!selected.length){toast('⚠️ Корзина уже пуста',true);return;}
  if(!confirm('Снять все отметки и очистить корзину?'))return;
  selected=[];
  saveToFirestore(); renderDishes(); renderCart();
  toast('🗑 Корзина очищена');
};

// ─── BUILD MESSAGE ────────────────────────────────────────────────────────────
function buildPlanText(mode) {
  const sel=dishes.filter(d=>selected.includes(d.id));
  if(!sel.length)return null;
  const totals={};
  sel.forEach(d=>(d.ingredients||[]).forEach(ing=>{
    const key=ing.name.toLowerCase().trim();
    if(!totals[key])totals[key]={name:ing.name,amounts:[]};
    if(ing.qty)totals[key].amounts.push(ing.qty);
  }));
  const missingMap={};
  if(fridge.length) sel.forEach(d=>{ const {missing}=dishFridgeStatus(d); missing.forEach(m=>{ if(!missingMap[m])missingMap[m]=[]; missingMap[m].push(d.name); }); });

  if(mode==='telegram') {
    let msg=`🍽 *Меню на сегодня*\n\n📋 *Выбранные блюда:*\n`;
    sel.forEach((d,i)=>{ msg+=`${i+1}. ${d.name}\n`; });
    msg+=`\n🛒 *Список продуктов:*\n`;
    Object.values(totals).forEach(e=>{ msg+=`• ${e.name}${e.amounts.length?': '+summarizeAmounts(e.amounts):''}\n`; });
    if(Object.keys(missingMap).length){ msg+=`\n❌ *Чего не хватает:*\n`; Object.entries(missingMap).forEach(([p,ds])=>{ msg+=`• ${p} (для: ${ds.join(', ')})\n`; }); }
    return msg.trim();
  } else {
    let txt='=== ПЛАН УЖИНОВ ===\n\n';
    sel.forEach(d=>{ txt+=`📌 ${d.name}\n${d.recipe}\n`; if((d.ingredients||[]).length){txt+='Ингредиенты:\n';d.ingredients.forEach(i=>{txt+=`  • ${i.name}${i.qty?' — '+i.qty:''}\n`;});} txt+='\n'+'─'.repeat(40)+'\n\n'; });
    txt+='=== СПИСОК ПОКУПОК ===\n';
    Object.values(totals).forEach(e=>{ txt+=`• ${e.name}${e.amounts.length?': '+summarizeAmounts(e.amounts):''}\n`; });
    if(Object.keys(missingMap).length){ txt+='\n=== ЧЕГО НЕ ХВАТАЕТ ===\n'; Object.entries(missingMap).forEach(([p,ds])=>{ txt+=`• ${p} (для: ${ds.join(', ')})\n`; }); }
    return txt.trim();
  }
}

// ─── TELEGRAM SEND ────────────────────────────────────────────────────────────
window.sendToTelegram = async function() {
  const text=buildPlanText('telegram');
  if(!text){toast('⚠️ Нет выбранных блюд для отправки',true);return;}
  const btn=document.getElementById('tg-send-btn');
  const orig=btn.innerHTML; btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Отправляю…';
  try {
    const res=await fetch(TG_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TG_CHAT,text,parse_mode:'Markdown'})});
    const data=await res.json();
    if(data.ok){
      toast('✅ Отправлено в Telegram!');
      // Send structured JSON for bot commands /recipe /recipes /missing
      const sel=dishes.filter(d=>selected.includes(d.id));
      const missingMap={};
      if(fridge.length) sel.forEach(d=>{ const {missing}=dishFridgeStatus(d); missing.forEach(m=>{ if(!missingMap[m])missingMap[m]=[]; missingMap[m].push(d.name); }); });
      const payload={type:'meal_plan',timestamp:new Date().toISOString(),
        dishes:sel.map(d=>({name:d.name,recipe:d.recipe,ingredients:d.ingredients||[]})),
        missing:Object.entries(missingMap).map(([p,ds])=>({product:p,forDishes:ds}))};
      fetch(TG_URL,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:TG_CHAT,text:`📊 *Данные для бота*\n\`\`\`json\n${JSON.stringify(payload,null,2)}\n\`\`\``,parse_mode:'Markdown'})
      }).catch(()=>{});
    } else {
      toast(`⚠️ Ошибка TG: ${data.description||'неизвестно'}`,true);
      console.error('TG error:',data);
    }
  } catch(e) {
    toast('⚠️ Ошибка сети при отправке в Telegram',true);
    console.error('TG fetch error:',e);
  } finally {
    btn.disabled=false; btn.innerHTML=orig;
  }
};

// ─── EXPORT ───────────────────────────────────────────────────────────────────
window.exportToClipboard = async function() {
  const text=buildPlanText('plain');
  if(!text){toast('⚠️ Нет выбранных блюд',true);return;}
  try {
    await navigator.clipboard.writeText(text);
    toast('📋 Скопировано в буфер обмена!');
  } catch {
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{document.execCommand('copy');toast('📋 Скопировано!');}catch{toast('⚠️ Не удалось скопировать',true);}
    document.body.removeChild(ta);
  }
};

// ─── RENDER ALL ───────────────────────────────────────────────────────────────
function renderAll() { renderDishes(); renderFridge(); renderCart(); }

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ document.getElementById('edit-modal-overlay').classList.remove('open'); editingDishId=null; }
  if(e.key==='Enter'&&e.target.id==='fridge-qty')  window.addFridgeItem();
  if(e.key==='Enter'&&e.target.id==='fridge-name') document.getElementById('fridge-qty').focus();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  await loadFromFirestore();
  initFirestoreSync();
  document.getElementById('app-loading').style.display = 'none';
  renderAll();
  window.addIngredientRow(); // seed one empty row
})();
</script>
